<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeFlow — Connexion Tradovate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0c10;
      color: #e0e6f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #13161e;
      border: 1px solid #1e2330;
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .logo { font-size: 36px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #8892a4; margin-bottom: 24px; line-height: 1.6; }
    .status {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }
    .status.loading {
      background: rgba(0,229,160,0.08);
      border: 1px solid rgba(0,229,160,0.2);
      color: #00e5a0;
    }
    .status.success {
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.3);
      color: #00e5a0;
    }
    .status.error {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff6b6b;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,229,160,0.3);
      border-top-color: #00e5a0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .close-note {
      margin-top: 20px;
      font-size: 11px;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📈</div>
    <h1>TradeFlow</h1>
    <div class="sub">Connexion Tradovate OAuth</div>
    <div class="status loading" id="st">
      <span class="spinner"></span>
      Connexion en cours...
    </div>
    <div class="close-note" id="note"></div>
  </div>

  <script>
    const st   = document.getElementById('st');
    const note = document.getElementById('note');

    function setStatus(type, msg){
      st.className = 'status ' + type;
      st.innerHTML = msg;
    }

    (function(){
      // Lire le code (ou erreur) depuis l'URL
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const error  = params.get('error');
      const errDesc = params.get('error_description');

      if(error){
        setStatus('error', '❌ ' + (errDesc || error));
        note.textContent = 'Vous pouvez fermer cette fenêtre.';
        // Notifier le parent
        if(window.opener){
          window.opener.postMessage({ type:'TV_ERROR', error }, window.opener.location.origin);
        }
        return;
      }

      if(!code){
        setStatus('error', '❌ Aucun code reçu de Tradovate.');
        note.textContent = 'Vous pouvez fermer cette fenêtre.';
        if(window.opener){
          window.opener.postMessage({ type:'TV_ERROR', error:'no_code' }, '*');
        }
        return;
      }

      // Succès — envoyer le code au parent
      setStatus('success', '✅ Connecté ! Récupération des trades...');
      note.textContent = 'Cette fenêtre va se fermer automatiquement.';

      try {
        if(window.opener){
          // Envoyer à la même origine (trading-journal.html)
          window.opener.postMessage(
            { type: 'TV_CODE', code },
            window.opener.location.origin
          );
        }
      } catch(e) {
        // Fallback si origin bloquée
        try {
          window.opener.postMessage({ type:'TV_CODE', code }, '*');
        } catch(e2) {}
      }

      // Fermer la popup après un court délai
      setTimeout(() => window.close(), 1500);
    })();
  </script>
</body>
</html>
